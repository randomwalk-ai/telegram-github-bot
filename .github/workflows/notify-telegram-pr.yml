name: Notify Telegram on PR

on:
  pull_request:
    types: [labeled]

jobs:
  notify:
    if: github.event.label.name == 'telegram'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          ISSUE_BODY="${{ github.event.pull_request.body }}"

          MESSAGE="✅ *PR Created by Claude!*%0A%0A📌 *${PR_TITLE}*%0A👤 Triggered by: @${PR_AUTHOR}%0A%0A[View Pull Request](${PR_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
